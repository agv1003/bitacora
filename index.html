<style>
:root{
  --bg:#FAF7F2;
  --surface:#FFFFFF;
  --ink:#242420;
  --ink-soft:#5C594F;
  --ink-muted:#9A9484;
  --line:#E7E1D5;
  --line-soft:#F0ECE2;
  --teal:#1F4A48;
  --teal-dark:#153433;
  --teal-soft:#E3ECEA;
  --berry:#9C4F5E;
  --berry-soft:#F4E5E8;
  --sage:#6E7F5C;
  --sage-soft:#EAEEE1;
  --gold:#B8873F;
  --gold-soft:#F5EBDA;
  --danger:#B4453D;
  --radius-sm:10px;
  --radius-md:16px;
  --radius-lg:22px;
  --shadow-card:0 1px 2px rgba(36,36,32,0.05), 0 2px 16px rgba(36,36,32,0.06);
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;touch-action:manipulation;}
body{
  background:var(--bg);
  color:var(--ink);
  font-family:'Inter',-apple-system,sans-serif;
  -webkit-font-smoothing:antialiased;
  min-height:100vh;
  padding-bottom:calc(84px + env(safe-area-inset-bottom));
  padding-left:env(safe-area-inset-left);
  padding-right:env(safe-area-inset-right);
}
h1,h2,h3,.serif{ font-family:'Fraunces',serif; letter-spacing:-0.01em; }
button, input, select, textarea{ font-family:inherit; }
::selection{ background:var(--teal-soft); }

/* ---------- layout shell ---------- */
#appShell{ max-width:640px; margin:0 auto; padding:0 20px 8px; }
.topbar{
  display:flex; align-items:center; justify-content:space-between;
  padding:calc(18px + env(safe-area-inset-top)) 20px 14px; max-width:640px; margin:0 auto;
}
.brand{ display:flex; align-items:center; gap:10px; }
.brand-mark{
  width:30px; height:30px; border-radius:50%;
  border:1.5px solid var(--teal); position:relative; flex-shrink:0;
}
.brand-mark::before, .brand-mark::after{
  content:""; position:absolute; left:50%; top:50%;
  transform:translate(-50%,-50%);
  border:1px solid var(--teal); border-radius:50%; opacity:0.55;
}
.brand-mark::before{ width:18px; height:18px; }
.brand-mark::after{ width:9px; height:9px; }
.brand-name{ font-size:17px; font-weight:600; font-family:'Fraunces',serif; }
.brand-sub{ font-size:11px; color:var(--ink-muted); margin-top:-2px; letter-spacing:.02em; }
.iconbtn{
  width:38px; height:38px; border-radius:50%; border:1px solid var(--line);
  background:var(--surface); display:flex; align-items:center; justify-content:center;
  cursor:pointer; color:var(--ink-soft); font-size:16px;
}
.iconbtn:active{ transform:scale(0.94); }

/* lane-line divider — signature motif */
.lanes{ display:flex; flex-direction:column; gap:3px; margin:22px 0 18px; }
.lanes span{ display:block; height:1px; background:var(--line); }
.lanes span:nth-child(2){ margin-left:14px; margin-right:14px; opacity:.6; }

.section-label{
  font-size:11.5px; text-transform:uppercase; letter-spacing:.09em;
  color:var(--ink-muted); font-weight:600; margin:0 0 10px 2px;
}

/* ---------- cards ---------- */
.card{
  background:var(--surface); border:1px solid var(--line);
  border-radius:var(--radius-lg); padding:18px; box-shadow:var(--shadow-card);
  margin-bottom:14px;
}
.card-tight{ padding:14px 16px; }

/* ---------- nav ---------- */
.tabbar{
  position:fixed; bottom:0; left:0; right:0;
  background:rgba(250,247,242,0.92); backdrop-filter:blur(10px);
  border-top:1px solid var(--line);
  display:flex; justify-content:space-around;
  padding:8px 4px calc(10px + env(safe-area-inset-bottom));
  padding-left:calc(4px + env(safe-area-inset-left));
  padding-right:calc(4px + env(safe-area-inset-right));
  z-index:50;
}
.tab{
  display:flex; flex-direction:column; align-items:center; gap:3px;
  border:none; background:none; color:var(--ink-muted);
  font-size:10.5px; font-weight:500; padding:4px 6px; cursor:pointer;
  flex:1; max-width:78px;
}
.tab .dot{ width:6px; height:6px; border-radius:50%; background:transparent; margin-bottom:1px; }
.tab.active{ color:var(--teal); }
.tab.active .dot{ background:var(--teal); }
.tab-ic{ font-size:19px; line-height:1; }

/* ---------- form elements ---------- */
label{ display:block; font-size:12.5px; color:var(--ink-soft); margin-bottom:5px; font-weight:500; }
input, select, textarea{
  width:100%; min-width:0; box-sizing:border-box; border:1px solid #DDD4C2; border-radius:var(--radius-sm);
  padding:11px 12px; font-size:14.5px; color:var(--ink); background:#F3EEE2;
  outline:none; transition:border-color .15s, background .15s;
}
input:focus, select:focus, textarea:focus{ border-color:var(--teal); background:var(--surface); }
.field{ margin-bottom:13px; }
.row2{ display:grid; grid-template-columns:minmax(0,1fr) minmax(0,1fr); gap:10px; min-width:0; }
.row3{ display:grid; grid-template-columns:minmax(0,1fr) minmax(0,1fr) minmax(0,1fr); gap:10px; min-width:0; }
.row2 > *, .row3 > *{ min-width:0; }

.btn{
  border:1px solid var(--line); background:var(--surface); color:var(--ink);
  border-radius:999px; padding:11px 18px; font-size:14px; font-weight:600;
  cursor:pointer; display:inline-flex; align-items:center; gap:6px; justify-content:center;
}
.btn:active{ transform:scale(0.97); }
.btn-primary{ background:var(--teal); border-color:var(--teal); color:#fff; }
.btn-block{ width:100%; }
.btn-ghost{ background:transparent; border-color:transparent; color:var(--ink-soft); padding:8px 10px; }
.btn-sm{ padding:7px 13px; font-size:12.5px; }
.btn-danger-outline{ color:var(--danger); border-color:#ECD3D0; }

.chip{
  display:inline-flex; align-items:center; gap:5px; padding:5px 11px;
  border-radius:999px; font-size:12px; font-weight:600; border:1px solid transparent;
}
.chip-teal{ background:var(--teal-soft); color:var(--teal-dark); }
.chip-berry{ background:var(--berry-soft); color:var(--berry); }
.chip-sage{ background:var(--sage-soft); color:var(--sage); }
.chip-gold{ background:var(--gold-soft); color:var(--gold); }
.chip-outline{ background:transparent; border-color:var(--line); color:var(--ink-soft); cursor:pointer; }
.chip-outline.on{ background:var(--ink); border-color:var(--ink); color:#fff; }

.empty{
  text-align:center; padding:34px 18px; color:var(--ink-muted); font-size:13.5px;
}
.empty .serif{ font-size:16px; color:var(--ink-soft); display:block; margin-bottom:4px; }

.hidden{ display:none !important; }

::-webkit-scrollbar{ width:0; height:0; }
</style>
</head>

<script>
/* ============ Firebase (cuenta de Google + nube) ============ */
const firebaseConfig = {
  apiKey: "AIzaSyDp-c-LrlT_d5iIy3HqfaDCw6J0vqzLxgE",
  authDomain: "bitacora-d878c.firebaseapp.com",
  projectId: "bitacora-d878c",
  storageBucket: "bitacora-d878c.firebasestorage.app",
  messagingSenderId: "167285782519",
  appId: "1:167285782519:web:f149e39970da9b69ec20f2"
};
let fbApp=null, fbAuth=null, fbDb=null, currentUser=null;
try{
  fbApp = firebase.initializeApp(firebaseConfig);
  fbAuth = firebase.auth();
  fbDb = firebase.firestore();
}catch(e){ console.error('Firebase init', e); }

async function signInWithGoogle(){
  if(!fbAuth){ toast('La conexión con la nube no cargó, revisa tu internet'); return; }
  const provider = new firebase.auth.GoogleAuthProvider();
  try{
    const result = await fbAuth.signInWithPopup(provider);
    toast('Sesión iniciada como ' + (result.user.email||''));
  }catch(e){
    console.error('popup falló, probando redirect', e);
    try{
      await fbAuth.signInWithRedirect(provider);
    }catch(e2){
      console.error('signIn error', e2);
      toast('Error al iniciar sesión: ' + (e2.code||e2.message||'desconocido'));
    }
  }
}
function signOutGoogle(){
  if(!fbAuth) return;
  fbAuth.signOut();
}
async function migrateToCloud(){
  if(!currentUser){ toast('Inicia sesión primero'); return; }
  toast('Subiendo tus datos a la nube…');
  try{
    await dbSet('profile', App.data.profile);
    await dbSet('measurements', App.data.measurements);
    await dbSet('habits', App.data.habits);
    await dbSet('habitLogs', App.data.habitLogs);
    await dbSet('nutrition', App.data.nutrition);
    await dbSet('routines', App.data.routines);
    await dbSet('workoutLogs', App.data.workoutLogs);
    await dbSet('photosMeta', App.data.photosMeta);
    const keys = Object.keys(App.data.photoCache||{});
    await Promise.all(keys.map(k=>dbSetRaw(k, App.data.photoCache[k])));
    toast('¡Listo! Tus datos ya están en la nube');
  }catch(e){
    console.error('migración', e);
    toast('Hubo un problema subiendo los datos');
  }
}
if(fbAuth){
  fbAuth.getRedirectResult().then(result=>{
    if(result && result.user) toast('Sesión iniciada como ' + (result.user.email||''));
  }).catch(e=>{
    console.error('redirect result', e);
    toast('Error al iniciar sesión: ' + (e.code||e.message||'desconocido'));
  });
  fbAuth.onAuthStateChanged(async (user)=>{
    const changed = (user && !currentUser) || (!user && currentUser);
    currentUser = user;
    if(changed && window.APP_BOOTED){
      await loadAll();
      render();
    }
  });
}

/* ============ almacenamiento ============ */
/* Usa el almacenamiento de Claude cuando está disponible (dentro de claude.ai).
   Si se abre como app independiente en el celular, usa localStorage del navegador
   para que los datos igual queden guardados en ese dispositivo. */
function hasCloudStorage(){
  return typeof window!=='undefined' && window.storage && typeof window.storage.get==='function';
}
function localGet(key){ try{ return localStorage.getItem('bitacora_'+key); }catch(e){ return null; } }
function localSet(key, value){ try{ localStorage.setItem('bitacora_'+key, value); }catch(e){ console.error('localStorage lleno o no disponible', e); } }
function localDelete(key){ try{ localStorage.removeItem('bitacora_'+key); }catch(e){ /* noop */ } }

async function dbGet(key, fallback){
  try{
    if(currentUser){
      const snap = await fbDb.collection('users').doc(currentUser.uid).collection('data').doc(key).get();
      return snap.exists ? JSON.parse(snap.data().value) : fallback;

    if(hasCloudStorage()){ const r = await window.storage.get(key, false); return r ? JSON.parse(r.value) : fallback; }
    const v = localGet(key);
    return v!=null ? JSON.parse(v) : fallback;
  }catch(e){ console.error('storage get', key, e); return fallback; }
}

function humanDate(iso){ const d=new Date(iso+'T00:00:00'); return d.getDate()+' '+MONTHS[d.getMonth()].slice(0,3); }

/* ============ recordatorios de calendario (.ics) ============
   No hay forma confiable de mandar notificaciones push desde una página
   web instalada así en iPhone sin un servidor. En vez de eso, generamos
   un archivo .ics que se agrega al Calendario nativo del celular, el cual
   sí puede avisar con una alerta aunque la app esté cerrada. */
function icsDate(d){
  const p = n => String(n).padStart(2,'0');
  return `${d.getFullYear()}${p(d.getMonth()+1)}${p(d.getDate())}T${p(d.getHours())}${p(d.getMinutes())}00`;
}
function icsDateUTC(d){
  const p = n => String(n).padStart(2,'0');
  return `${d.getUTCFullYear()}${p(d.getUTCMonth()+1)}${p(d.getUTCDate())}T${p(d.getUTCHours())}${p(d.getUTCMinutes())}${p(d.getUTCSeconds())}Z`;
}
function icsEscape(s){ return String(s).replace(/([,;])/g,'\\$1'); }
function buildICS(events){
  let ics = 'BEGIN:VCALENDAR\r\nVERSION:2.0\r\nPRODID:-//Bitacora//ES\r\nCALSCALE:GREGORIAN\r\n';
  events.forEach(ev=>{
    ics += 'BEGIN:VEVENT\r\n';
    ics += `UID:${ev.uid}@bitacora\r\n`;
    ics += `DTSTAMP:${icsDateUTC(new Date())}\r\n`;
    ics += `DTSTART:${icsDate(ev.dtstart)}\r\n`;
    ics += `DTEND:${icsDate(new Date(ev.dtstart.getTime()+15*60000))}\r\n`;
    ics += `SUMMARY:${icsEscape(ev.title)}\r\n`;
    if(ev.description) ics += `DESCRIPTION:${icsEscape(ev.description)}\r\n`;
    if(ev.rrule) ics += `RRULE:${ev.rrule}\r\n`;
    ics += 'BEGIN:VALARM\r\nACTION:DISPLAY\r\nDESCRIPTION:Recordatorio\r\nTRIGGER:PT0M\r\nEND:VALARM\r\n';
    ics += 'END:VEVENT\r\n';
  });
  ics += 'END:VCALENDAR\r\n';
  return ics;
}
function downloadICS(filename, content){
  const blob = new Blob([content], {type:'text/calendar;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
}
function nextWeeklyOccurrence(dayIndex, timeStr){
  const [hh,mm] = timeStr.split(':').map(Number);
  const now = new Date();
  const d = new Date(now.getFullYear(), now.getMonth(), now.getDate(), hh, mm, 0);
  let diff = (dayIndex - now.getDay() + 7) % 7;
  if(diff===0 && d<=now) diff = 7;
  d.setDate(d.getDate()+diff);
  return d;
}
function nextDailyOccurrence(timeStr){
  const [hh,mm] = timeStr.split(':').map(Number);
  const now = new Date();
  const d = new Date(now.getFullYear(), now.getMonth(), now.getDate(), hh, mm, 0);
  if(d<=now) d.setDate(d.getDate()+1);
  return d;
}

/* ============ nutrición ============ */
const ACT = { sedentario:1.2, ligero:1.375, moderado:1.55, intenso:1.725 };
const GOALM = { mantener:1, deficit:0.85, superavit:1.1 };
function computeTargets(p){
  if(!p || !p.weight || !p.height || !p.age) return null;
  const w=+p.weight, h=+p.height, a=+p.age;
  let bmr = p.sex==='hombre' ? (10*w+6.25*h-5*a+5) : (10*w+6.25*h-5*a-161);
  const factor = ACT[p.activity]||1.375;
  const goal = GOALM[p.goalType]||1;
  const cal = bmr*factor*goal;
  const protein = 2*w;
  const fat = (cal*0.25)/9;
  const carbs = (cal - protein*4 - fat*9)/4;
  return { calories:Math.round(cal), protein:Math.round(protein), carbs:Math.round(Math.max(carbs,0)), fat:Math.round(fat) };
}

async function exportBackup(){
  toast('Preparando respaldo…');
  const photoKeys = [];
  const meta = App.data.photosMeta || {};
  for(const year of Object.keys(meta)){
    const info = meta[year];
    for(let g=0; g<(info.grids||1); g++){
      const filled = (info.filled && info.filled[g]) || [];
      for(let slot=0; slot<12; slot++){
        if(filled[slot]) photoKeys.push(`photoimg_${year}_${g}_${slot}`);
      }
    }
  }
  const photos = {};
  await Promise.all(photoKeys.map(async k=>{ const v = await dbGetRaw(k); if(v) photos[k]=v; }));
  const backup = {
    version:1, exportedAt: new Date().toISOString(),
    profile: App.data.profile, measurements: App.data.measurements, habits: App.data.habits,
    habitLogs: App.data.habitLogs, nutrition: App.data.nutrition, routines: App.data.routines,
    workoutLogs: App.data.workoutLogs, photosMeta: App.data.photosMeta,
    photos
  };
  const blob = new Blob([JSON.stringify(backup)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `bitacora-respaldo-${todayISO()}.json`;
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
  toast('Respaldo descargado');
}
function importBackup(ev){
  const file = ev.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = async () => {
    try{
      const backup = JSON.parse(reader.result);
      const ok = confirm('Esto reemplaza todos los datos actuales en este dispositivo por los del respaldo. ¿Continuar?');
      if(!ok) return;
      await dbSet('profile', backup.profile||null);
      await dbSet('measurements', backup.measurements||[]);
      await dbSet('habits', backup.habits||[]);
      await dbSet('habitLogs', backup.habitLogs||{});
      await dbSet('nutrition', backup.nutrition||null);
      await dbSet('routines', backup.routines||{days:[]});
      await dbSet('workoutLogs', backup.workoutLogs||[]);
      await dbSet('photosMeta', backup.photosMeta||{});
      const photos = backup.photos||{};
      await Promise.all(Object.keys(photos).map(k=>dbSetRaw(k, photos[k])));
      toast('Respaldo importado, recargando…');
      setTimeout(()=>location.reload(), 900);
    }catch(e){
      console.error(e);
      toast('El archivo no es un respaldo válido');
    }
  };
  reader.readAsText(file);
}

  const ms = App.data.measurements||[];
  const last = ms[0], prev = ms[1];
  const weightNow = last ? last.weight : (p&&p.weight);
  const weightDelta = (last && prev && last.weight && prev.weight) ? round1(last.weight - prev.weight) : null;
  const today = todayISO();
  const habits = App.data.habits||[];
  const logToday = (App.data.habitLogs||{})[today] || {};
  const doneToday = habits.filter(h=>logToday[h.id]===true).length;
  const wlogs = App.data.workoutLogs||[];
  const weekStart = addDays(today, -6);
  const workoutsThisWeek = wlogs.filter(l=> l.date>=weekStart && l.date<=today).length;
  const totalDays = (App.data.routines&&App.data.routines.days||[]).length || 6;

  if(!p || !p.name){
    return `
    <div class="lanes"><span></span><span></span><span></span></div>
    <div class="card" style="text-align:center;padding:32px 20px;">
      <h1 class="serif" style="font-size:20px;margin:0 0 6px;">Bienvenida a tu bitácora</h1>
      <p style="color:var(--ink-muted);font-size:13.5px;margin:0 0 16px;">Empecemos creando tu perfil para calcular tus objetivos.</p>
      <button class="btn btn-primary" onclick="Nav.go('perfil')">${icon('plus')} Crear mi perfil</button>
    </div>`;
  }

  return `
  <div class="lanes"><span></span><span></span><span></span></div>
  <h1 class="serif" style="font-size:22px;margin:0 0 2px;">Hola, ${esc(p.name.split(' ')[0])}</h1>
  <p style="color:var(--ink-muted);font-size:13px;margin:0 0 18px;">${humanDate(today)} · semana en curso</p>

  <div class="row3" style="margin-bottom:14px;">
    <div class="card card-tight" style="text-align:center;">
      <div style="font-size:20px;font-weight:600;font-family:'Fraunces',serif;">${weightNow?round1(weightNow):'—'}</div>
      <div style="font-size:11px;color:var(--ink-muted);">peso kg</div>
      ${weightDelta!==null?`<div style="font-size:10.5px;margin-top:3px;color:${weightDelta<=0?'var(--sage)':'var(--berry)'}">${weightDelta>0?'+':''}${weightDelta}</div>`:''}

function saveMeasurement(){

function yearBlockHtml(year){
  const meta = App.data.photosMeta || {};
  const grids = (meta[year] && meta[year].grids) || 1;
  let html = `<div class="section-label">${year}</div>`;
  for(let g=0; g<grids; g++){
    html += `<div class="card card-tight" style="margin-bottom:10px;">
      <div style="display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:6px;min-width:0;overflow:hidden;">
        ${Array.from({length:12}).map((_,slot)=>photoSlotHtml(year,g,slot)).join('')}
      </div>
    </div>`;
  }
  const filled = (meta[year] && meta[year].filled && meta[year].filled[grids-1]) || [];
  const lastFull = filled.filter(Boolean).length>=12;
  if(lastFull && !App.ui.compareMode){
    html += `<button class="btn btn-sm" style="margin:0 0 18px;" onclick="addPhotoGrid(${year})">${icon('plus')} Agregar otra cuadrícula para ${year}</button>`;
  } else {
    html += `<div style="margin-bottom:18px;"></div>`;
  }
  return html;
}

    ${icon('camera')}
    <input type="file" accept="image/*" style="display:none;" onchange="uploadPhoto(event,${year},${gridIdx},${slot})">
  </label>`;
}
async function loadVisiblePhotos(){
  const meta = App.data.photosMeta || {};
  const keysToLoad = [];
  for(const year of Object.keys(meta)){
    const info = meta[year];
    for(let g=0; g<(info.grids||1); g++){
      const filled = (info.filled && info.filled[g]) || [];
      for(let slot=0; slot<12; slot++){
        if(filled[slot]){
          const key = `photoimg_${year}_${g}_${slot}`;
          if(!App.data.photoCache[key]) keysToLoad.push(key);
        }
      }
    }
  }
  if(!keysToLoad.length) return;
  await Promise.all(keysToLoad.map(async key=>{
    const val = await dbGetRaw(key);
    if(val) App.data.photoCache[key] = val;
  }));
  if(App.current==='fotos') render();
}
function resizeImage(file){
  return new Promise((resolve,reject)=>{
    const reader = new FileReader();
    reader.onload = () => {
      const img = new Image();
      img.onload = () => {
        const max = 480;
        let w=img.width, h=img.height;
        if(w>h){ if(w>max){ h=Math.round(h*max/w); w=max; } } else { if(h>max){ w=Math.round(w*max/h); h=max; } }
        const canvas = document.createElement('canvas');
        canvas.width=w; canvas.height=h;
        canvas.getContext('2d').drawImage(img,0,0,w,h);
        resolve(canvas.toDataURL('image/jpeg',0.72));
      };
      img.onerror = reject;
      img.src = reader.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}
async function uploadPhoto(ev, year, gridIdx, slot){
  const file = ev.target.files[0];
  if(!file) return;
  const dataUrl = await resizeImage(file);
  const key = `photoimg_${year}_${gridIdx}_${slot}`;
  App.data.photoCache[key] = dataUrl;
  App.data.photosMeta[year] = App.data.photosMeta[year] || {grids:1, filled:[]};
  App.data.photosMeta[year].filled[gridIdx] = App.data.photosMeta[year].filled[gridIdx] || [];
  App.data.photosMeta[year].filled[gridIdx][slot] = true;
  render();
  dbSetRaw(key, dataUrl);
  dbSet('photosMeta', App.data.photosMeta);
}
function deletePhoto(year, gridIdx, slot){
  const key = `photoimg_${year}_${gridIdx}_${slot}`;
  delete App.data.photoCache[key];
  if(App.data.photosMeta[year] && App.data.photosMeta[year].filled[gridIdx]){
    App.data.photosMeta[year].filled[gridIdx][slot] = false;
  }
  render();
  dbDelete(key);
  dbSet('photosMeta', App.data.photosMeta);
}
function addPhotoGrid(year){
  App.data.photosMeta[year] = App.data.photosMeta[year] || {grids:1, filled:[]};
  App.data.photosMeta[year].grids += 1;
  render();
  dbSet('photosMeta', App.data.photosMeta);
}

/* ---- galería a pantalla completa (ver una por una) ---- */
function flattenPhotos(){
  const meta = App.data.photosMeta || {};
  const years = Object.keys(meta).map(Number);
  const curYear = new Date().getFullYear();
  if(!years.includes(curYear)) years.push(curYear);
  years.sort((a,b)=>b-a);
  const list = [];
  years.forEach(year=>{
    const info = meta[year] || {grids:1, filled:[]};
    const grids = info.grids || 1;
    for(let g=0; g<grids; g++){
      const filled = (info.filled && info.filled[g]) || [];
      for(let slot=0; slot<12; slot++){
        if(filled[slot]) list.push({year, g, slot, key:`photoimg_${year}_${g}_${slot}`});
      }
    }
  });
  return list;
}
function openLightbox(key){
  const list = flattenPhotos();
  const idx = list.findIndex(p=>p.key===key);
  if(idx<0) return;
  App.ui.lightboxList = list;
  App.ui.lightboxIdx = idx;
  render();
}
function closeLightbox(){ App.ui.lightboxIdx = null; render(); }
function lightboxNav(dir){
  if(App.ui.lightboxIdx==null) return;
  const n = App.ui.lightboxList.length;
  App.ui.lightboxIdx = (App.ui.lightboxIdx + dir + n) % n;
  render();
}
function lightboxHtml(){

  const list = App.ui.lightboxList;
  const p = list[App.ui.lightboxIdx];

    <div style="display:flex;justify-content:space-between;align-items:center;padding:calc(16px + env(safe-area-inset-top)) calc(16px + env(safe-area-inset-right)) 16px calc(16px + env(safe-area-inset-left));">

    </div>
  </div>`;

/* ---- comparar / collage ---- */
function toggleCompareMode(){

  App.ui.compareSelection = [];
  render();
}
function toggleSelectPhoto(key){
  const sel = App.ui.compareSelection;
  const i = sel.indexOf(key);
  if(i>=0) sel.splice(i,1);
  else if(sel.length<4) sel.push(key);
  else toast('Máximo 4 fotos por comparativa');
  render();
}
function compareBarHtml(){
  if(!App.ui.compareMode) return '';
  const n = App.ui.compareSelection.length;
  return `<div class="card" style="position:sticky;bottom:calc(76px + env(safe-area-inset-bottom));display:flex;align-items:center;gap:10px;box-shadow:0 4px 18px rgba(36,36,32,0.12);">
    <span style="flex:1;font-size:13px;color:var(--ink-soft);">${n} foto${n===1?'':'s'} seleccionada${n===1?'':'s'}</span>
    <button class="btn btn-sm btn-primary" ${n<2?'disabled style="opacity:0.4;"':''} onclick="createCollage()">${icon('check')} Crear comparativa</button>
  </div>`;
}
function loadImageEl(src){
  return new Promise((resolve,reject)=>{
    const im = new Image();
    im.onload = ()=>resolve(im);
    im.onerror = reject;
    im.src = src;
  });
}
async function createCollage(){
  const keys = App.ui.compareSelection;
  if(keys.length<2){ toast('Selecciona al menos 2 fotos'); return; }
  toast('Creando comparativa…');
  try{
    const imgs = await Promise.all(keys.map(k=>loadImageEl(App.data.photoCache[k])));
    const targetH = 480;
    const gap = 6;
    const widths = imgs.map(im=>Math.round(im.width*targetH/im.height));
    const totalW = widths.reduce((a,b)=>a+b,0) + gap*(imgs.length-1);
    const canvas = document.createElement('canvas');
    canvas.width = totalW; canvas.height = targetH;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#FAF7F2'; ctx.fillRect(0,0,totalW,targetH);
    let x=0;
    imgs.forEach((im,i)=>{ ctx.drawImage(im,x,0,widths[i],targetH); x += widths[i]+gap; });
    App.ui.collageResult = canvas.toDataURL('image/jpeg',0.9);
    App.ui.compareMode = false;
    App.ui.compareSelection = [];
    render();
  }catch(e){
    console.error('collage', e);
    toast('No se pudo crear la comparativa');
  }
}

function downloadCollage(){
  const a = document.createElement('a');

  a.download = `comparativa-${todayISO()}.jpg`;

}

function habSemanaHtml(habits){
  if(!habits.length) return `<div class="empty card"><span class="serif">Sin hábitos aún</span>Agrega hábitos desde la pestaña Hoy.</div>`;
  const dates = last7Dates();
  let totalDone=0, totalMarked=0;
  let html = `<div class="card">`;
  habits.forEach(h=>{
    html += `<div style="margin-bottom:14px;">
      <div style="font-size:13px;margin-bottom:6px;display:flex;justify-content:space-between;"><span>${esc(h.name)}</span></div>
      <div style="display:flex;gap:5px;">
        ${dates.map(d=>{
          const st = (App.data.habitLogs[d]||{})[h.id];
          if(st===true) totalDone++, totalMarked++; else if(st===false) totalMarked++;
          const bg = st===true?'var(--sage)':st===false?'var(--danger)':'var(--line-soft)';
          return `<div title="${d}" style="flex:1;height:22px;border-radius:6px;background:${bg};opacity:${st===undefined?'0.5':'1'};"></div>`;
        }).join('')}
      </div>
      <div style="display:flex;gap:5px;margin-top:3px;">
        ${dates.map(d=>`<div style="flex:1;text-align:center;font-size:9.5px;color:var(--ink-muted);">${WEEKDAYS[new Date(d+'T00:00:00').getDay()][0]}</div>`).join('')}
      </div>
    </div>`;
  });
  html += `</div>`;
  const pct = totalMarked? Math.round(100*totalDone/totalMarked) : 0;
  return `<div class="card card-tight" style="text-align:center;margin-bottom:14px;">
    <div style="font-size:24px;font-weight:600;font-family:'Fraunces',serif;color:var(--teal);">${pct}%</div>
    <div style="font-size:11.5px;color:var(--ink-muted);">cumplimiento de la semana</div>
  </div>` + html;
}
function habMesHtml(habits){
  if(!habits.length) return `<div class="empty card"><span class="serif">Sin hábitos aún</span>Agrega hábitos desde la pestaña Hoy.</div>`;
  const now = new Date();
  const year = now.getFullYear(), month = now.getMonth();
  const daysInMonth = new Date(year, month+1, 0).getDate();
  let sumPct=0, daysWithData=0;
  const cells = [];
  for(let d=1; d<=daysInMonth; d++){
    const iso = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const log = App.data.habitLogs[iso];
    let ratio = null;
    if(log){
      const vals = habits.map(h=>log[h.id]).filter(v=>v!==undefined);
      if(vals.length){ ratio = vals.filter(v=>v===true).length/vals.length; sumPct+=ratio; daysWithData++; }
    }
    cells.push({d, ratio, future: iso>todayISO()});
  }
  const monthPct = daysWithData ? Math.round(100*sumPct/daysWithData) : 0;
  return `
  <div class="card card-tight" style="text-align:center;margin-bottom:14px;">
    <div style="font-size:24px;font-weight:600;font-family:'Fraunces',serif;color:var(--teal);">${monthPct}%</div>
    <div style="font-size:11.5px;color:var(--ink-muted);">cumplimiento de ${MONTHS[month]}</div>
  </div>
  <div class="card">
    <div style="display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:5px;min-width:0;">
      ${cells.map(c=>{
        let bg='var(--line-soft)';
        if(c.ratio!==null) bg = c.ratio>=0.75?'var(--sage)': c.ratio>=0.4?'#C9D2B9':'#F0C9C4';
        return `<div style="aspect-ratio:1;border-radius:7px;background:${c.future?'transparent':bg};border:${c.future?'1px dashed var(--line)':'none'};display:flex;align-items:center;justify-content:center;font-size:10px;color:${c.ratio!==null?'var(--ink)':'var(--ink-muted)'};">${c.d}</div>`;
      }).join('')}
    </div>
  </div>`;
}
function addHabit(){
  const name = document.getElementById('h_name').value.trim();

  const cat = document.getElementById('h_cat').value;

/* ============ vista: entreno ============ */
function ensureRoutines(){
  App.data.routines = App.data.routines || {days:[]};
  if(!App.data.routines.days) App.data.routines.days = [];
}
function viewEntreno(){
  ensureRoutines();
  App.ui.entMode = App.ui.entMode || 'rutina';
  return `
  <div class="lanes"><span></span><span></span><span></span></div>
  <h1 class="serif" style="font-size:21px;margin:0 0 12px;">Entreno</h1>
  <div style="display:flex;gap:6px;margin-bottom:14px;">
    <button class="chip chip-outline ${App.ui.entMode==='rutina'?'on':''}" onclick="setEntMode('rutina')">Mi rutina</button>
    <button class="chip chip-outline ${App.ui.entMode==='hoy'?'on':''}" onclick="setEntMode('hoy')">Hoy</button>
    <button class="chip chip-outline ${App.ui.entMode==='progreso'?'on':''}" onclick="setEntMode('progreso')">Progreso</button>
  </div>
  ${App.ui.entMode==='rutina'?entRutinaHtml(): App.ui.entMode==='hoy'?entHoyHtml(): entProgresoHtml()}

function setEntMode(m){ App.ui.entMode=m; render(); }

function entRutinaHtml(){
  const days = App.data.routines.days;
  if(!days.length){
    return `<div class="empty card"><span class="serif">Crea tu rutina</span>Entrenas 6 veces por semana en casa: carga tu rutina guardada o agrega un día desde cero.
    <div style="margin-top:14px;display:flex;gap:8px;justify-content:center;flex-wrap:wrap;">
      <button class="btn btn-primary" onclick="loadDefaultRoutine()">${icon('plus')} Cargar mi rutina de fuerza</button>
      <button class="btn" onclick="addDay()">${icon('plus')} Agregar día en blanco</button>
    </div></div>`;
  }
  let html = `<button class="btn btn-sm" style="margin-bottom:12px;" onclick="loadDefaultRoutine()">${icon('chev')} Recargar mi rutina de fuerza (6 días)</button>`;
  html += days.map(d=>`
    <div class="card" style="margin-bottom:12px;">
      <div style="display:flex;gap:8px;align-items:center;margin-bottom:10px;">
        <input value="${esc(d.name)}" oninput="updateDayName('${d.id}',this.value)" style="font-weight:600;font-size:14.5px;">
        <button class="iconbtn" style="width:30px;height:30px;flex-shrink:0;" onclick="deleteDay('${d.id}')" aria-label="Eliminar día">${icon('trash')}</button>
      </div>
      ${d.exercises.map(ex=>`
        <div class="row2" style="grid-template-columns:minmax(0,2fr) minmax(0,0.7fr) minmax(0,0.7fr) minmax(0,0.8fr) auto;gap:6px;margin-bottom:6px;align-items:center;min-width:0;">
          <input placeholder="Ejercicio" value="${esc(ex.name)}" oninput="updateExField('${d.id}','${ex.id}','name',this.value)" style="font-size:13px;padding:8px 9px;">
          <input placeholder="series" value="${ex.sets||''}" oninput="updateExField('${d.id}','${ex.id}','sets',this.value)" style="font-size:13px;padding:8px 9px;">
          <input placeholder="reps" value="${ex.reps||''}" oninput="updateExField('${d.id}','${ex.id}','reps',this.value)" style="font-size:13px;padding:8px 9px;">
          <input placeholder="kg" value="${ex.weight||''}" oninput="updateExField('${d.id}','${ex.id}','weight',this.value)" style="font-size:13px;padding:8px 9px;">
          <button class="iconbtn" style="width:30px;height:30px;" onclick="deleteExercise('${d.id}','${ex.id}')" aria-label="Eliminar ejercicio">${icon('x')}</button>
        </div>`).join('')}
      <button class="btn btn-sm" style="margin-top:6px;" onclick="addExercise('${d.id}')">${icon('plus')} Ejercicio</button>
    </div>
  `).join('');
  html += `<button class="btn btn-block" onclick="addDay()">${icon('plus')} Agregar día de entreno</button>`;
  return html;
}
function loadDefaultRoutine(){
  if(App.data.routines.days.length>0){
    const ok = confirm('Esto reemplaza los días que tienes ahora por tu rutina de fuerza (Lunes a Sábado). ¿Continuar?');
    if(!ok) return;
  }
  App.data.routines.days = DEFAULT_ROUTINE.map(d=>({
    id: uid(),
    name: d.name,
    exercises: d.exercises.map(name=>({ id: uid(), name, sets:4, reps:12, weight:'' }))
  }));
  toast('Rutina cargada');
  render();
  dbSet('routines', App.data.routines);
}
function addDay(){
  ensureRoutines();
  App.data.routines.days.push({id:uid(), name:`Día ${App.data.routines.days.length+1}`, exercises:[]});
  render();
  dbSet('routines', App.data.routines);
}
function deleteDay(id){
  App.data.routines.days = App.data.routines.days.filter(d=>d.id!==id);
  render();
  dbSet('routines', App.data.routines);
}
function updateDayName(id,val){
  const d = App.data.routines.days.find(d=>d.id===id);
  if(d){ d.name = val; debounceSave('routines', ()=>App.data.routines); }
}
function addExercise(dayId){
  const d = App.data.routines.days.find(d=>d.id===dayId);
  d.exercises.push({id:uid(), name:'', sets:'', reps:'', weight:''});
  render();
  dbSet('routines', App.data.routines);
}
function deleteExercise(dayId, exId){
  const d = App.data.routines.days.find(d=>d.id===dayId);
  d.exercises = d.exercises.filter(e=>e.id!==exId);
  render();
  dbSet('routines', App.data.routines);
}
function updateExField(dayId, exId, field, val){
  const d = App.data.routines.days.find(d=>d.id===dayId);
  const e = d.exercises.find(e=>e.id===exId);
  if(e){ e[field] = val; debounceSave('routines', ()=>App.data.routines); }
}

function entHoyHtml(){
  const days = App.data.routines.days;
  if(!days.length) return `<div class="empty card"><span class="serif">Primero crea tu rutina</span>Ve a la pestaña Mi rutina para agregar tus días de entreno.</div>`;
  App.ui.hoyDay = App.ui.hoyDay || days[0].id;
  const day = days.find(d=>d.id===App.ui.hoyDay) || days[0];
  const today = todayISO();
  const existingLog = (App.data.workoutLogs||[]).find(l=>l.date===today && l.dayId===day.id);
  return `
  <div class="field"><label>Día de rutina</label>
    <select onchange="setHoyDay(this.value)">
      ${days.map(d=>`<option value="${d.id}" ${d.id===day.id?'selected':''}>${esc(d.name)}</option>`).join('')}
    </select>
  </div>
  <div class="card">
    ${day.exercises.length? day.exercises.map((ex,i)=>{
      const saved = existingLog && existingLog.entries[i];
      return `<div style="padding:10px 0;border-bottom:1px solid var(--line-soft);">
        <div style="font-size:13.5px;font-weight:500;margin-bottom:6px;">${esc(ex.name)||'(sin nombre)'} <span style="color:var(--ink-muted);font-weight:400;">${ex.sets&&ex.reps?`· ${ex.sets}x${ex.reps}`:''}</span></div>
        <div class="row3" style="align-items:center;">
          <input id="hoy_w_${i}" type="number" placeholder="kg usado" value="${saved?saved.weight:(ex.weight||'')}">
          <input id="hoy_r_${i}" type="number" placeholder="reps" value="${saved?saved.reps:(ex.reps||'')}">
          <label style="display:flex;align-items:center;gap:6px;font-size:12.5px;color:var(--ink-soft);"><input id="hoy_d_${i}" type="checkbox" style="width:auto;" ${saved&&saved.done?'checked':''}> hecho</label>
        </div>
      </div>`;
    }).join('') : `<p style="color:var(--ink-muted);font-size:13px;">Este día no tiene ejercicios todavía.</p>`}
    ${day.exercises.length?`<button class="btn btn-primary btn-block" style="margin-top:14px;" onclick="saveTodayWorkout('${day.id}')">${icon('check')} Guardar entreno de hoy</button>`:''}
  </div>`;
}
function setHoyDay(id){ App.ui.hoyDay = id; render(); }
function saveTodayWorkout(dayId){
  const day = App.data.routines.days.find(d=>d.id===dayId);
  const entries = day.exercises.map((ex,i)=>({
    exerciseName: ex.name,
    weight: document.getElementById('hoy_w_'+i).value,
    reps: document.getElementById('hoy_r_'+i).value,
    done: document.getElementById('hoy_d_'+i).checked
  }));
  const today = todayISO();
  App.data.workoutLogs = App.data.workoutLogs||[];
  const idx = App.data.workoutLogs.findIndex(l=>l.date===today && l.dayId===dayId);
  const record = {id: idx>=0?App.data.workoutLogs[idx].id:uid(), date:today, dayId, dayName:day.name, entries};
  if(idx>=0) App.data.workoutLogs[idx] = record; else App.data.workoutLogs.push(record);
  toast('Entreno de hoy guardado');
  render();
  dbSet('workoutLogs', App.data.workoutLogs);
}

function entProgresoHtml(){
  App.ui.progMode = App.ui.progMode || 'dia';
  return `
  <div style="display:flex;gap:6px;margin-bottom:14px;">
    <button class="chip chip-outline ${App.ui.progMode==='dia'?'on':''}" onclick="setProgMode('dia')">Por día</button>
    <button class="chip chip-outline ${App.ui.progMode==='ejercicio'?'on':''}" onclick="setProgMode('ejercicio')">Por ejercicio</button>
  </div>
  ${App.ui.progMode==='dia' ? entProgresoPorDiaHtml() : entProgresoPorEjercicioHtml()}
  `;
}
function setProgMode(m){ App.ui.progMode = m; render(); }

function entProgresoPorDiaHtml(){
  const days = App.data.routines.days||[];
  if(!days.length) return `<div class="empty card"><span class="serif">Primero crea tu rutina</span>Ve a la pestaña Mi rutina para agregar tus días de entreno.</div>`;
  App.ui.progDay = (App.ui.progDay && days.some(d=>d.id===App.ui.progDay)) ? App.ui.progDay : days[0].id;
  const day = days.find(d=>d.id===App.ui.progDay);
  const logs = (App.data.workoutLogs||[]).filter(l=>l.dayId===day.id).sort((a,b)=>a.date<b.date?-1:1);
  return `
  <div class="field"><label>Día</label>
    <select onchange="setProgDay(this.value)">
      ${days.map(d=>`<option value="${d.id}" ${d.id===day.id?'selected':''}>${esc(d.name)}</option>`).join('')}
    </select>
  </div>
  ${!logs.length ? `<div class="empty card"><span class="serif">Sin registros para este día</span>Registra este día en la pestaña Hoy para empezar a ver su avance mensual.</div>` : ''}
  ${day.exercises.map((ex,i)=>{
    const pts = logs.filter(l=>l.entries[i] && l.entries[i].exerciseName===ex.name && l.entries[i].weight!=='').map(l=>({date:l.date, weight:+l.entries[i].weight}));
    let deltaHtml = '';
    if(pts.length>=2){
      const delta = round1(pts[pts.length-1].weight - pts[0].weight);
      const color = delta>0 ? 'var(--sage)' : delta<0 ? 'var(--danger)' : 'var(--ink-muted)';
      deltaHtml = `<span style="font-size:12px;color:${color};font-weight:600;">${delta>0?'+':''}${delta} kg</span>`;
    }
    return `<div class="card" style="margin-bottom:12px;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
        <span style="font-size:13.5px;font-weight:500;">${esc(ex.name)||'(sin nombre)'}</span>
        ${deltaHtml}
      </div>
      ${pts.length ? `<div style="position:relative;height:140px;"><canvas id="dayChart_${i}" role="img" aria-label="Progreso de ${esc(ex.name)}"></canvas></div>` : `<p style="font-size:12px;color:var(--ink-muted);margin:0;">Sin registros todavía.</p>`}
    </div>`;
  }).join('')}
  `;
}
function setProgDay(id){ App.ui.progDay = id; render(); }

function entProgresoPorEjercicioHtml(){
  const names = new Set();
  (App.data.routines.days||[]).forEach(d=>d.exercises.forEach(e=>{ if(e.name) names.add(e.name); }));
  (App.data.workoutLogs||[]).forEach(l=>l.entries.forEach(e=>{ if(e.exerciseName) names.add(e.exerciseName); }));
  const list = Array.from(names);
  if(!list.length) return `<div class="empty card"><span class="serif">Aún no hay datos</span>Registra tus entrenos en la pestaña Hoy para ver tu progreso por ejercicio.</div>`;
  App.ui.progEx = App.ui.progEx && list.includes(App.ui.progEx) ? App.ui.progEx : list[0];
  return `
  <div class="field"><label>Ejercicio</label>
    <select onchange="setProgEx(this.value)">${list.map(n=>`<option value="${esc(n)}" ${n===App.ui.progEx?'selected':''}>${esc(n)}</option>`).join('')}</select>
  </div>
  <div class="card"><div style="position:relative;height:220px;"><canvas id="exChart" role="img" aria-label="Progreso de peso por ejercicio"></canvas></div></div>
  `;
}
function setProgEx(n){ App.ui.progEx = n; render(); }

function bindEntreno(){
  if(App.ui.entMode!=='progreso') return;
  if(App.ui.progMode==='dia'){
    Object.keys(App.charts).filter(k=>k.startsWith('day')).forEach(k=>{ App.charts[k].destroy(); delete App.charts[k]; });
    const days = App.data.routines.days||[];
    const day = days.find(d=>d.id===App.ui.progDay);
    if(!day) return;
    const logs = (App.data.workoutLogs||[]).filter(l=>l.dayId===day.id).sort((a,b)=>a.date<b.date?-1:1);
    day.exercises.forEach((ex,i)=>{
      const canvas = document.getElementById('dayChart_'+i);
      if(!canvas) return;
      const pts = logs.filter(l=>l.entries[i] && l.entries[i].exerciseName===ex.name && l.entries[i].weight!=='').map(l=>({date:l.date, weight:+l.entries[i].weight}));
      if(!pts.length) return;
      App.charts['day_'+i] = new Chart(canvas, {
        type:'line',
        data:{ labels:pts.map(p=>humanDate(p.date)), datasets:[{
          data:pts.map(p=>p.weight),
          borderColor:'#1F4A48', backgroundColor:'rgba(31,74,72,0.08)', fill:true,
          tension:0.3, pointRadius:3, pointBackgroundColor:'#1F4A48', borderWidth:2
        }]},
        options:{ responsive:true, maintainAspectRatio:false,
          plugins:{legend:{display:false}, tooltip:{callbacks:{label:c=>c.parsed.y+' kg'}}},
          scales:{ y:{grid:{color:'#F0ECE2'}, ticks:{color:'#9A9484',font:{size:10}}}, x:{grid:{display:false}, ticks:{color:'#9A9484',font:{size:10}}} }
        }
      });
    });
    return;
  }
  const canvas = document.getElementById('exChart');
  if(!canvas) return;
  const ex = App.ui.progEx;
  const pts = (App.data.workoutLogs||[])
    .filter(l=>l.entries.some(e=>e.exerciseName===ex && e.weight!==''))
    .sort((a,b)=> a.date<b.date?-1:1)
    .map(l=>{ const e=l.entries.find(e=>e.exerciseName===ex); return {date:l.date, weight:+e.weight}; });
  if(App.charts.ex) App.charts.ex.destroy();
  App.charts.ex = new Chart(canvas, {
    type:'line',
    data:{ labels:pts.map(p=>humanDate(p.date)), datasets:[{
      label:ex, data:pts.map(p=>p.weight),
      borderColor:'#9C4F5E', backgroundColor:'rgba(156,79,94,0.08)', fill:true,
      tension:0.3, pointRadius:3, pointBackgroundColor:'#9C4F5E', borderWidth:2
    }]},
    options:{ responsive:true, maintainAspectRatio:false,
      plugins:{legend:{display:false}, tooltip:{callbacks:{label:c=>c.parsed.y+' kg'}}},
      scales:{ y:{grid:{color:'#F0ECE2'}, ticks:{color:'#9A9484',font:{size:11}}}, x:{grid:{display:false}, ticks:{color:'#9A9484',font:{size:11}}} }
    }
  });
}

/* ============ bloqueo extra de zoom (iOS ignora a veces el viewport) ============ */
document.addEventListener('gesturestart', e => e.preventDefault());
document.addEventListener('gesturechange', e => e.preventDefault());
let _lastTouchEnd = 0;
document.addEventListener('touchend', e => {
  const now = Date.now();
  if(now - _lastTouchEnd <= 300) e.preventDefault();
  _lastTouchEnd = now;
}, { passive:false });

/* ============ boot ============ */
(async function boot(){
  await loadAll();
  seedDefaultRoutineIfEmpty();
  renderTabbar();
  render();
  window.APP_BOOTED = true;
})();
</script>
</body>
</html>
